aid: berkshire-grey
name: Berkshire Grey
description: >-
  Berkshire Grey is a Bedford, Massachusetts-based AI and robotics company
  that builds integrated pick-and-place, parcel sortation, trailer-unloading,
  and shuttle-sortation systems for eCommerce fulfillment, retail
  replenishment, and parcel logistics operations. Its product portfolio is
  organized around four flagship robotic systems — Core robotic picking
  system, Dispatch parcel sorter, Scoop trailer unloader, and Stride shuttle
  sorter — supported by the BG Flex mobile robotic platform and a centralized
  operating environment that orchestrates fleets of industrial-grade mobile
  robots for induct, transport, sort, sequence, and fulfill workflows
  including buy-online-pickup-in-store, curbside, and store replenishment.
  The company holds 700+ awarded patents (300+ pending) and has deployed
  solutions with Global-100 retailers and logistics service providers
  including Walmart, Target, and FedEx, with FedEx expanding from small-parcel
  sortation into broader AI robotic package-handling capabilities. Berkshire
  Grey originally went public via SPAC merger with Revolution Acceleration
  Acquisition Corp in 2021, then entered into a definitive merger agreement
  with SoftBank Group in 2023 (approximately $375M / $1.40 per share) and is
  now operated as a private SoftBank portfolio company. Integration with
  warehouse-management systems is delivered through a proprietary RESTful API
  surfaced via professional services and a 24/7 remote monitoring and
  predictive-maintenance support model; the API, BG-OS platform, and any
  associated SDKs are not publicly documented, and Berkshire Grey does not
  operate a public developer portal, downloadable SDK, or open-source release
  for its robotic operating environment.
